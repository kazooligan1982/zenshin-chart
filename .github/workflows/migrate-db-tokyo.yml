name: Migrate DB to Tokyo

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/pgdg.asc
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump from zenshin-web (India → backup.sql)
        env:
          PGPASSWORD: ${{ secrets.OLD_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          set -euo pipefail
          pg_dump \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            -h aws-1-ap-south-1.pooler.supabase.com \
            -p 5432 \
            -U postgres.ijjucbnkythlwxrknzch \
            -d postgres \
            -f backup.sql
          echo "✅ Dump完了: $(wc -l < backup.sql) 行"

      - name: Restore to zenshin-chart (Tokyo)
        env:
          PGPASSWORD: ${{ secrets.NEW_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          set -euo pipefail
          psql \
            -h db.wglutqoufuvnzmkruewg.supabase.co \
            -U postgres \
            -d postgres \
            -f backup.sql
          echo "✅ リストア完了"
